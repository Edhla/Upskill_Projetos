<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8" />
    <title>Gestão de Veículos</title>
</head>

<body>
    <div id="topo">
        <h1>Gestão de Veículos</h1>

        <button id="carregarLS">(Re)Inicializar BD</button>
        <button id="limparLS">Limpar BD</button>

        <h2>Adicionar / Editar Veículo</h2>
        <form id="formVeiculo">
            <input type="hidden" id="editIndex" />
            <input type="text" id="marca" placeholder="Marca" required />
            <input type="text" id="modelo" placeholder="Modelo" required />
            <input type="number" id="ano" placeholder="Ano" required />
            <input type="date" id="inspecao" required />
            <label><input type="checkbox" id="vendido" /> Vendido</label>
            <button type="submit">Guardar</button>
        </form>

        <h2>Filtros</h2>
        <select id="fMarca">
            <option value="">Todas as marcas</option>
        </select>
        <select id="fAno">
            <option value="">Todos os anos</option>
        </select>
        <select id="fVendido">
            <option value="">Todos</option>
            <option value="false">Disponíveis</option>
            <option value="true">Vendidos</option>
        </select>

    </div>

    <table>
        <thead>
            <tr>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Ano</th>
                <th>Última Inspeção</th>
                <th>Estado</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>

    <script>
        function setDate(y, m, d) {
            let tmp = new Date(y, m, d);
            tmp.setMonth(tmp.getMonth() - 1);
            return tmp;
        }

        function inspecaoEstado(data) {
            const agora = new Date();
            const diffMeses = (agora - data) / (1000 * 60 * 60 * 24 * 30);
            if (diffMeses > 12) return '<span class="vendido">Expirada</span>';
            if (diffMeses > 10) return '<span class="aviso">A expirar</span>';
            return '<span class="ok">Válida</span>';
        }

        function editar(i) {
            const v = veiculos[i];
            document.getElementById('editIndex').value = i;
            marca.value = v.marca;
            modelo.value = v.modelo;
            ano.value = v.ano;
            inspecao.value = toInputDateLocal(v.ultimaInspecao); // sem fusos horários envolvidos
            vendido.checked = v.vendido;
        };

        function toInputDateLocal(d) {
            const pad = n => String(n).padStart(2, "0");
            return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
        }

        function guardar() {
            localStorage.setItem('veiculos', JSON.stringify(veiculos));
        }


        [fMarca, fAno, fVendido].forEach(f => f.addEventListener('change', render));

        preencherFiltros();
        render();
    </script>
</body>

</html>
